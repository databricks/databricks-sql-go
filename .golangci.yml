version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - errcheck
    - gosec
    - govet
    - ineffassign
    - nakedret
    - nolintlint
    - staticcheck
    - unused
  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/databricks/databricks-sql-go
    gosec:
      exclude-generated: true
      severity: low
      confidence: low
    nolintlint:
      allow-unused: true
formatters:
  enable:
    - gofmt
