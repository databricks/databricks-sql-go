version: "2"

linters:
  disable-all: true
  enable:
    - bodyclose
    - depguard
    - dogsled
    # - dupl
    - errcheck
    # - funlen
    # - gochecknoinits
    # - goconst
    # - gocritic
    # - gocyclo
    # - goimports
    # - mnd
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    # - lll
    # - misspell
    - nakedret
    # - noctx
    - nolintlint
    - staticcheck
    # - stylecheck
    # - unconvert
    # - unparam
    - unused
    # - whitespace

  # don't enable:
  # - asciicheck
  # - gochecknoglobals
  # - gocognit
  # - godot
  # - godox
  # - err113
  # - ireturn
  # - nestif
  # - testpackage
  # - revive

formatters:
  enable:
    - gofmt
    # - goimports

linters-settings:
  depguard:
    rules:
      main:
        allow:
          - $gostd
          - github.com/databricks/databricks-sql-go
  gosec:
    exclude-generated: true
    severity: "low"
    confidence: "low"

run:
  timeout: 5m
